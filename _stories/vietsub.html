<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kho Video Vietsub - Nửa Bước Thành Thơ</title>
    <style>
        /* Cài đặt cơ bản cho trang */
        body {
            margin: 0; padding: 0;
            background-color: #141414; /* Màu nền tối kiểu Netflix */
            color: #fff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        /* Phần Tiêu đề trang */
        .header {
            text-align: center;
            padding: 50px 20px 30px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8) 0%, rgba(20,20,20,1) 100%);
        }
        .header h1 { margin: 0; font-size: 2.5rem; color: #e50914; /* Đỏ dâu tây nổi bật */ }
        .header p { color: #aaa; font-size: 1.1rem; margin-top: 10px; }

        /* Lưới chứa các thẻ Video */
        .video-gallery {
            display: grid;
            /* Tự động chia cột: màn hình to thì 3-4 cột, điện thoại thì 1 cột */
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            padding: 20px 5vw 60px; /* Căn lề hai bên */
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Thiết kế từng Thẻ Video */
        .video-card {
            background-color: #222;
            border-radius: 10px;
            overflow: hidden; /* Bo tròn luôn cả góc ảnh */
            text-decoration: none; /* Bỏ gạch chân của link */
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            box-shadow: 0 4px 8px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
        }

        /* Hiệu ứng khi rê chuột vào thẻ */
        .video-card:hover {
            transform: translateY(-8px); /* Nhảy nhẹ lên */
            box-shadow: 0 12px 24px rgba(0,0,0,0.8);
        }

        /* Ảnh bìa Video */
        .video-thumb {
            width: 100%;
            aspect-ratio: 16 / 9; /* Giữ chuẩn tỉ lệ YouTube */
            object-fit: cover;
            border-bottom: 3px solid #e50914; /* Đường viền đỏ phân cách */
        }

        /* Phần chữ dưới ảnh */
        .video-info { padding: 15px; }
        .video-title {
            color: #fff;
            font-size: 1.1rem;
            font-weight: bold;
            margin: 0 0 8px 0;
            /* Giới hạn tên video dài quá sẽ biến thành dấu ... */
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .video-meta {
            color: #888;
            font-size: 0.9rem;
            display: flex;
            justify-content: space-between;
        }
        .tag {
            background: #e50914;
            color: white;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>VIETSUB</h1>
        <p>Tổng hợp các bản dịch bởi Nửa Bước Thành Thơ</p>
    </div>

    <div class="video-gallery">

        <a href="/2026/05/20/snh48-love-ver.html" class="video-card">
            <img src="https://img.youtube.com/vi/e4r185KsUmQ/maxresdefault.jpg" alt="Thumbnail" class="video-thumb">
            <div class="video-info">
                <h3 class="video-title">《Love Ver.》 - SNH48</h3>
                <div class="video-meta">
                    <span>20/05/2026</span>
                    <span class="tag">Mới nhất</span>
                </div>
            </div>
        </a>
