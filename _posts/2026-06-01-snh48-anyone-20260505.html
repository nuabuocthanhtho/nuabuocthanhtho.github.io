<script>
    function jumpToVideoTime(timeStr) {
        let seconds = 0;
        let parts = timeStr.split(':');
        
        // Tính toán đổi Phút:Giây (VD: 54:20) hoặc Giờ:Phút:Giây (VD: 1:02:15) ra giây
        if (parts.length === 2) {
            seconds = parseInt(parts[0]) * 60 + parseInt(parts[1]);
        } else if (parts.length === 3) {
            seconds = parseInt(parts[0]) * 3600 + parseInt(parts[1]) * 60 + parseInt(parts[2]);
        }

        // Bắn tín hiệu vào trong iframe
        const iframe = document.getElementById('vietsub-iframe').contentWindow;
        iframe.postMessage({ command: 'seekTo', time: seconds }, '*');
    }
</script>
